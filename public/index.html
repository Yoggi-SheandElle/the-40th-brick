<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>The 40th Brick</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <div id="game-container"></div>

  <!-- Phaser 3 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <!-- Socket.io client -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- Input + Save systems -->
  <script src="js/gamepad.js"></script>
  <script src="js/save.js"></script>

  <!-- Game data -->
  <script src="js/constants.js"></script>
  <script src="js/data/achievements.js"></script>
  <script src="js/data/quotes.js"></script>
  <script src="js/data/personal-puzzles.js"></script>

  <!-- Game modules -->
  <script src="js/network.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/entities/Player.js"></script>
  <script src="js/scenes/BootScene.js"></script>
  <script src="js/scenes/TitleScene.js"></script>
  <script src="js/scenes/LobbyScene.js"></script>
  <script src="js/scenes/WorldMapScene.js"></script>
  <script src="js/scenes/AchievementScene.js"></script>
  <script src="js/scenes/Chapter1Scene.js"></script>
  <script src="js/scenes/Chapter2Scene.js"></script>
  <script src="js/scenes/Chapter3Scene.js"></script>
  <script src="js/scenes/FinaleScene.js"></script>

  <!-- Main entry -->
  <script src="js/main.js"></script>

  <!-- Register Service Worker for offline play -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('[PWA] Service Worker registered'))
        .catch(err => console.warn('[PWA] SW registration failed:', err));
    }
  </script>
</body>
</html>
